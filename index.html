<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Member Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
        }
        
        .card-glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(0, 0, 0, 0.05); 
            transition: transform 0.2s ease;
        }

        .card-glass:hover { transform: translateY(-2px); }

        .atm-card { 
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); 
            color: white; 
            border-radius: 24px; 
            padding: 24px; 
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        /* Custom Scrollbar for better UX */
        #members-list::-webkit-scrollbar { width: 4px; }
        #members-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="pb-10">

    <header class="p-8 pb-24 bg-slate-900 text-white rounded-b-[2.5rem] shadow-xl text-center">
        <h1 class="text-2xl font-extrabold tracking-tight">FTCF Member Ledger</h1>
        <p class="text-amber-400 font-medium mt-1 text-sm tracking-wide opacity-90">"Amanat me khiyanat nahi"</p>
    </header>

    <main class="max-w-xl mx-auto px-4 -mt-16 space-y-6">
        <!-- Balance Card -->
        <div class="card-glass p-8 rounded-3xl text-center shadow-sm">
            <p class="text-[11px] font-bold uppercase tracking-[0.2em] opacity-40">Total Fund Balance</p>
            <h2 id="grand-total" class="text-4xl font-extrabold mt-3 text-slate-900 tracking-tight">Rs. 0</h2>
        </div>

        <!-- Members Section -->
        <section>
            <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40 mb-3 ml-1 text-slate-500">Members List</h3>
            <div id="members-list" class="grid grid-cols-2 gap-4 max-h-[350px] overflow-y-auto p-1">
                <!-- Data will inject here -->
            </div>
        </section>

        <!-- ATM Card -->
        <div class="atm-card mt-2">
            <div class="flex justify-between items-start mb-8">
                <i class="fas fa-sim-card text-2xl text-amber-500"></i>
                <span class="font-bold tracking-widest text-[10px] opacity-60">HBL KONNECT</span>
            </div>
            <div class="space-y-1">
                <p class="text-[10px] uppercase tracking-widest opacity-50">Account Title</p>
                <p class="font-semibold text-lg">Afzaal Ahmed</p>
                <p class="text-[10px] uppercase tracking-widest opacity-50 mt-4">Account Number</p>
                <p class="font-mono text-xl tracking-wider font-medium">0342-2735966</p>
            </div>
        </div>

        <div class="text-center opacity-30 text-[9px] font-bold uppercase tracking-[0.2em] mt-8">
            @FTCF2026 Founder Mughal Brothers
        </div>
    </main>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtsZyNI2Ss1ACTIO7X1zAND4Q-mGhFdKSVcvx8amNxfGsFQfA2A7kBLHJgTJ9DGECqNNZ40iHW7zDc/pub?output=csv';

        Papa.parse(csvUrl, {
            download: true, header: true, dynamicTyping: true,
            complete: function(results) {
                const members = results.data.filter(m => m.name);
                let grandTotal = members.reduce((sum, m) => sum + (m.fund || 0), 0);
                document.getElementById('grand-total').innerText = "Rs. " + grandTotal.toLocaleString();

                const list = document.getElementById('members-list');
                list.innerHTML = '';
                
                members.forEach(m => {
                    const profilePic = (m.photo && m.photo.length > 5) 
                        ? m.photo 
                        : `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=1e293b&color=fff`;

                    list.innerHTML += `
                        <div class="card-glass p-4 rounded-2xl text-center shadow-sm flex flex-col items-center">
                            <img src="${profilePic}" class="w-14 h-14 rounded-full mb-3 object-cover border-4 border-slate-50 shadow-inner" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}'">
                            <p class="text-[11px] font-semibold text-slate-700 truncate w-full">${m.name}</p>
                            <p class="text-[12px] font-black text-emerald-600 mt-1">Rs. ${m.fund.toLocaleString()}</p>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
