<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Member Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .card-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.04); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .total-card { background: linear-gradient(135deg, #ecfdf5 0%, #dcfce7 100%); border: 1px solid rgba(16, 185, 129, 0.1); }
        .atm-card { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); color: white; border-radius: 24px; padding: 24px; position: relative; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .scroll-container { background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%); border: 1px solid #e2e8f0; }
        #members-list::-webkit-scrollbar { width: 4px; }
        #members-list::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="pb-10">

    <header class="p-8 pb-24 bg-slate-900 text-white rounded-b-[2.5rem] shadow-xl text-center">
        <h1 class="text-2xl font-extrabold tracking-tight">Family Trust & Care Foundation</h1>
        <p class="text-amber-400 font-medium mt-1 text-sm tracking-wide opacity-90">"Amanat me khiyanat nahi,Behtreen Nizam Asal Kamyabi"</p>
    </header>

    <main class="max-w-xl mx-auto px-4 -mt-16 space-y-6">
        <div class="total-card p-6 rounded-3xl text-center shadow-sm">
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-emerald-600 opacity-70">Total Contribution</p>
            <h2 id="grand-total" class="text-3xl font-extrabold mt-2 text-emerald-900 tracking-tight">Rs. 0</h2>
        </div>

        <section>
            <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40 mb-3 ml-1 text-slate-500">Members List</h3>
            <div id="members-list" class="scroll-container grid grid-cols-2 gap-3 max-h-[350px] overflow-y-auto p-4 rounded-3xl shadow-inner"></div>
        </section>

        <!-- History Modal -->
        <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
            <div class="bg-white p-6 rounded-3xl w-full max-w-sm max-h-[80vh] flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="modal-name" class="font-bold text-slate-900"></h3>
                    <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-slate-400 hover:text-slate-900"><i class="fas fa-times"></i></button>
                </div>
                <div id="history-data" class="space-y-2 overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="atm-card mt-2">
            <div class="flex justify-between items-start mb-8">
                <i class="fas fa-sim-card text-2xl text-amber-500"></i>
                <span class="font-bold tracking-widest text-[10px] opacity-60">HBL KONNECT</span>
            </div>
            <div class="space-y-1">
                <p class="text-[10px] uppercase tracking-widest opacity-50">Account Title</p>
                <p class="font-semibold text-lg">Afzaal Ahmed</p>
                <p class="text-[10px] uppercase tracking-widest opacity-50 mt-4">Account Number</p>
                <p class="font-mono text-xl tracking-wider font-medium">0342-2735966</p>
            </div>
        </div>

        <div class="text-center opacity-30 text-[9px] font-bold uppercase tracking-[0.2em] mt-8">
            @FTCF2026 Founder Mughal Brothers
        </div>
    </main>

    <script>
        const mainSheet = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtsZyNI2Ss1ACTIO7X1zAND4Q-mGhFdKSVcvx8amNxfGsFQfA2A7kBLHJgTJ9DGECqNNZ40iHW7zDc/pub?output=csv';
        const historySheet = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtsZyNI2Ss1ACTIO7X1zAND4Q-mGhFdKSVcvx8amNxfGsFQfA2A7kBLHJgTJ9DGECqNNZ40iHW7zDc/pub?gid=2038080316&single=true&output=csv';
        
        let historyData = [];

        Promise.all([
            fetch(mainSheet).then(res => res.text()),
            fetch(historySheet).then(res => res.text())
        ]).then(([mainCsv, historyCsv]) => {
            const main = Papa.parse(mainCsv, {header: true, dynamicTyping: true}).data.filter(m => m.name);
            historyData = Papa.parse(historyCsv, {header: true, dynamicTyping: true}).data;

            let grandTotal = main.reduce((sum, m) => sum + (m.fund || 0), 0);
            document.getElementById('grand-total').innerText = "Rs. " + grandTotal.toLocaleString();

            const list = document.getElementById('members-list');
            main.forEach(m => {
                const profilePic = m.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}`;
                list.innerHTML += `
                    <div onclick="showHistory('${m.name}')" class="bg-white border border-slate-100 p-3 rounded-2xl flex items-center gap-3 cursor-pointer shadow-[0_2px_10px_-3px_rgba(15,23,42,0.1)] transition-all duration-300 hover:bg-slate-900 group">
                        <img src="${profilePic}" class="w-10 h-10 rounded-full object-cover">
                        <div class="overflow-hidden">
                            <p class="text-[10px] font-bold text-slate-800 uppercase tracking-wide truncate group-hover:text-white">${m.name}</p>
                            <p class="text-[10px] font-black text-emerald-600 group-hover:text-emerald-400">Rs. ${m.fund.toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });
        });

        function showHistory(name) {
            const memberHistory = historyData.filter(row => {
                const values = Object.values(row);
                return values[0] && values[0].toString().trim() === name.trim();
            });
            
            const container = document.getElementById('history-data');
            document.getElementById('modal-name').innerText = name + "'s Record";
            
            if(memberHistory.length > 0) {
                container.innerHTML = memberHistory.map(row => {
                    const values = Object.values(row);
                    return `
                        <div class="flex justify-between text-xs border-b pb-1">
                            <span>${values[1] || 'N/A'}</span>
                            <span class="font-bold">Rs. ${values[2] ? parseInt(values[2]).toLocaleString() : 0}</span>
                        </div>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<p class="text-xs text-center text-slate-400">No records found.</p>';
            }
            document.getElementById('modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
