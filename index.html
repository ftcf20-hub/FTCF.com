<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Member Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; }
        .card-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .atm-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; border-radius: 20px; padding: 20px; position: relative; overflow: hidden; }
    </style>
</head>
<body class="pb-10">

    <header class="p-8 pb-20 bg-slate-900 text-white rounded-b-[3rem] shadow-2xl text-center">
        <h1 class="text-2xl font-black uppercase tracking-tight">FTCF Member Ledger</h1>
        <p class="text-amber-500 font-bold mt-1 text-sm italic">"Amanat me khiyant nahi"</p>
    </header>

    <main class="max-w-xl mx-auto px-4 -mt-12 space-y-6">
        <div class="card-glass p-8 rounded-3xl text-center shadow-lg">
            <p class="text-[10px] font-bold uppercase opacity-50 tracking-widest">Total Fund Balance</p>
            <h2 id="grand-total" class="text-4xl font-extrabold mt-2 text-slate-900">Rs. 0</h2>
        </div>

        <section>
            <h3 class="text-xs font-bold uppercase opacity-50 mb-3 ml-1">Members List</h3>
            <div id="members-list" class="grid grid-cols-2 gap-3 max-h-[350px] overflow-y-auto p-2 border-t border-slate-200">
                </div>
        </section>

        <div class="atm-card shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <i class="fas fa-sim-card text-2xl text-amber-500"></i>
                <span class="font-bold tracking-widest text-xs opacity-70">HBL KONNECT</span>
            </div>
            <div class="space-y-1">
                <p class="text-[10px] uppercase opacity-60">Account Title</p>
                <p class="font-bold text-lg">Afzaal Ahmed</p>
                <p class="text-[10px] uppercase opacity-60 mt-2">Account Number</p>
                <p class="font-mono text-xl tracking-wider">0342-2735966</p>
            </div>
        </div>

        <div class="text-center opacity-50 text-[10px] font-bold uppercase tracking-widest">
            @FTCF2026 Founder Mughal Brothers
        </div>
    </main>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtsZyNI2Ss1ACTIO7X1zAND4Q-mGhFdKSVcvx8amNxfGsFQfA2A7kBLHJgTJ9DGECqNNZ40iHW7zDc/pub?output=csv';

        Papa.parse(csvUrl, {
            download: true, header: true, dynamicTyping: true,
            complete: function(results) {
                const members = results.data.filter(m => m.name);
                let grandTotal = members.reduce((sum, m) => sum + (m.fund || 0), 0);
                document.getElementById('grand-total').innerText = "Rs. " + grandTotal.toLocaleString();

                const list = document.getElementById('members-list');
                members.forEach(m => {
                    list.innerHTML += `
                        <div class="card-glass p-3 rounded-xl text-center shadow-sm">
                            <p class="text-[10px] font-bold truncate">${m.name}</p>
                            <p class="text-[11px] font-black text-emerald-600">Rs. ${m.fund.toLocaleString()}</p>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
