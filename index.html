<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Member Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fcfcfc; 
        }
        
        /* Minimalist Glassmorphism */
        .card-glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 0, 0, 0.03); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }

        .card-glass:hover { 
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            transform: translateY(-2px); 
        }

        /* Luxury ATM Card */
        .atm-card { 
            background: #0f172a; 
            color: #f8fafc; 
            border-radius: 28px; 
            padding: 32px; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.3);
        }
        
        .atm-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        #members-list::-webkit-scrollbar { width: 4px; }
        #members-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="pb-10">

    <header class="p-8 pb-24 bg-slate-900 text-white rounded-b-[3rem] shadow-2xl text-center">
        <h1 class="text-2xl font-extrabold tracking-tight">Family Trust & Care Foundation</h1>
        <p class="text-amber-400/80 font-medium mt-1 text-[11px] uppercase tracking-[0.2em]">Amanat me khiyanat nahi</p>
    </header>

    <main class="max-w-xl mx-auto px-4 -mt-16 space-y-8">
        <div class="card-glass p-8 rounded-[2rem] text-center">
            <p class="text-[10px] font-bold uppercase tracking-[0.25em] text-slate-400 mb-2">Total Contribution</p>
            <h2 id="grand-total" class="text-5xl font-extrabold text-slate-900 tracking-tighter">Rs. 0</h2>
        </div>

        <section>
            <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 mb-4 ml-1">Member Ledger</h3>
            <div id="members-list" class="grid grid-cols-2 gap-4 max-h-[350px] overflow-y-auto p-1">
                <!-- Data will inject here -->
            </div>
        </section>

        <div class="atm-card">
            <div class="flex justify-between items-start mb-10">
                <div class="w-10 h-7 bg-amber-400/20 rounded-md border border-amber-400/30 flex items-center justify-center">
                    <i class="fas fa-sim-card text-amber-400/60"></i>
                </div>
                <span class="font-bold tracking-[0.2em] text-[9px] opacity-40">HBL KONNECT</span>
            </div>
            <div class="space-y-1">
                <p class="text-[9px] uppercase tracking-[0.2em] opacity-40">Account Title</p>
                <p class="font-semibold text-lg">Afzaal Ahmed</p>
                <p class="text-[9px] uppercase tracking-[0.2em] opacity-40 mt-5">Account Number</p>
                <p class="font-mono text-xl tracking-widest font-light">0342-2735966</p>
            </div>
        </div>

        <div class="text-center opacity-20 text-[9px] font-bold uppercase tracking-[0.2em] mt-8">
            &copy; FTCF 2026 | Mughal Brothers
        </div>
    </main>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtsZyNI2Ss1ACTIO7X1zAND4Q-mGhFdKSVcvx8amNxfGsFQfA2A7kBLHJgTJ9DGECqNNZ40iHW7zDc/pub?output=csv';

        Papa.parse(csvUrl, {
            download: true, header: true, dynamicTyping: true,
            complete: function(results) {
                const members = results.data.filter(m => m.name);
                let grandTotal = members.reduce((sum, m) => sum + (m.fund || 0), 0);
                document.getElementById('grand-total').innerText = "Rs. " + grandTotal.toLocaleString();

                const list = document.getElementById('members-list');
                list.innerHTML = '';
                
                members.forEach(m => {
                    const profilePic = (m.photo && m.photo.length > 5) 
                        ? m.photo 
                        : `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=f1f5f9&color=64748b&bold=true`;

                    list.innerHTML += `
                        <div class="card-glass p-5 rounded-[2rem] flex flex-col items-center gap-3">
                            <div class="relative">
                                <img src="${profilePic}" class="w-14 h-14 rounded-2xl object-cover shadow-inner" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}'">
                                <div class="absolute -top-1 -right-1 w-3 h-3 bg-emerald-400 rounded-full border-2 border-white"></div>
                            </div>
                            <div class="text-center w-full">
                                <p class="text-[10px] font-bold text-slate-700 uppercase tracking-wide truncate w-full">${m.name}</p>
                                <p class="text-[11px] font-black text-slate-900 mt-1">Rs. ${m.fund.toLocaleString()}</p>
                            </div>
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
